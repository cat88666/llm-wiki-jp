[settings]
title = "日本语 N2 知识库索引"
description = "面向 N5→N2 学习路径。L0 文字词汇 → L1 基础文法 → L2 中级文法 → L3 上级文法 → L4 敬语 → L5 读解听解。"

summaries = []
synthesis = []

# ── L0 文字词汇 ──────────────────────────────────────
[[layers]]
id = "L0"
name = "文字词汇：假名 / 汉字 / 语种 / 构词体系"
concept_dirs = ["concepts/01-moji-goi"]
core_keywords = ["假名体系", "汉字体系", "语种体系", "构词体系", "数量词", "拟声拟态词"]
keywords = [
  { text = "假名体系", path = "concepts/01-moji-goi/概念-假名体系.md" },
  { text = "汉字体系", path = "concepts/01-moji-goi/概念-汉字体系.md" },
  { text = "语种体系", path = "concepts/01-moji-goi/概念-语种体系.md" },
  { text = "构词体系", path = "concepts/01-moji-goi/概念-构词体系.md" },
  { text = "数量词", path = "concepts/01-moji-goi/机制-数量词.md" },
  { text = "拟声拟态词", path = "concepts/01-moji-goi/机制-拟声拟态词.md" },
  { text = "惯用句与谚语", path = "concepts/01-moji-goi/机制-惯用句与谚语.md" },
  { text = "N2近义词辨析", path = "concepts/01-moji-goi/机制-N2近义词辨析.md" },
]

